<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dino Panel Flip</title>
  <style>
    :root {
      --leaf: #42b883;
      --leaf-deep: #177b58;
      --leaf-dark: #0d4e3c;
      --egg: #fff6db;
      --egg-shade: #f2d58e;
      --coral: #f06449;
      --coral-deep: #b83f2d;
      --sky: #4f9fd9;
      --sky-soft: #d9efff;
      --sun: #f8c537;
      --ink: #22312e;
      --muted: #64736d;
      --paper: #fffdf4;
      --line: rgba(23, 123, 88, 0.22);
      --shadow: 0 18px 34px rgba(32, 47, 43, 0.18);
      --radius: 8px;
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.58) 25%, transparent 25%) 0 0 / 22px 22px,
        linear-gradient(315deg, rgba(255, 255, 255, 0.34) 25%, transparent 25%) 0 0 / 22px 22px,
        linear-gradient(180deg, #e4f6d6 0%, #d3eff4 52%, #f8e5ae 100%);
      overflow: hidden;
    }

    button {
      color: inherit;
      font: inherit;
    }

    .app {
      width: 100%;
      height: 100dvh;
      overflow: hidden;
    }

    .screen {
      width: 100%;
      height: 100dvh;
      overflow: hidden;
    }

    .hidden {
      display: none !important;
    }

    .menu-screen {
      display: grid;
      place-items: center;
      padding: clamp(14px, 3vw, 28px);
    }

    .menu-layout {
      width: min(920px, 100%);
      display: grid;
      grid-template-columns: 1fr 310px;
      gap: clamp(18px, 5vw, 46px);
      align-items: center;
    }

    .brand {
      min-width: 0;
    }

    .brand-row,
    .screen-title,
    .play-title {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mascot {
      flex: 0 0 auto;
      width: clamp(54px, 8vw, 88px);
      height: auto;
      filter: drop-shadow(0 12px 12px rgba(45, 77, 56, 0.18));
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      color: #173f35;
      font-size: clamp(2.6rem, 8vw, 5.6rem);
      line-height: 0.92;
      letter-spacing: 0;
    }

    .tagline {
      margin-top: 12px;
      color: #42645c;
      font-size: clamp(0.95rem, 2.4vw, 1.15rem);
      font-weight: 850;
    }

    .menu-card,
    .stage-shell,
    .target-section,
    .side-card,
    .result-window {
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 253, 244, 0.9);
      box-shadow: var(--shadow);
    }

    .menu-card {
      display: grid;
      gap: 12px;
      padding: 16px;
    }

    .progress-pill {
      min-height: 52px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      border-radius: var(--radius);
      background: #fff6db;
      border: 2px solid rgba(248, 197, 55, 0.35);
      color: var(--leaf-dark);
      font-weight: 950;
    }

    .progress-pill strong {
      color: var(--coral-deep);
      font-size: 1.5rem;
      line-height: 1;
    }

    .menu-button,
    .world-tab,
    .tool-button,
    .stage-button,
    .result-button,
    .icon-button {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 13px;
      border: 0;
      border-radius: var(--radius);
      background: #fffdf4;
      box-shadow: inset 0 -4px rgba(0, 0, 0, 0.13), 0 8px 0 rgba(53, 76, 57, 0.15);
      cursor: pointer;
      font-weight: 950;
      transition: transform 140ms ease, box-shadow 140ms ease, filter 140ms ease;
    }

    .menu-button.primary,
    .result-button.primary {
      color: #fff;
      background: linear-gradient(145deg, #ff7c5f, var(--coral));
    }

    .menu-button.sky,
    .tool-button.sky,
    .result-button.sky {
      color: #11384d;
      background: linear-gradient(145deg, #ccecff, var(--sky-soft));
    }

    .tool-button.green {
      color: #fff;
      background: linear-gradient(145deg, #62d890, var(--leaf-deep));
    }

    .menu-button:hover,
    .menu-button:focus-visible,
    .world-tab:hover,
    .world-tab:focus-visible,
    .tool-button:hover,
    .tool-button:focus-visible,
    .stage-button:hover,
    .stage-button:focus-visible,
    .result-button:hover,
    .result-button:focus-visible,
    .icon-button:hover,
    .icon-button:focus-visible {
      outline: none;
      filter: saturate(1.08);
      transform: translateY(-2px);
      box-shadow: inset 0 -4px rgba(0, 0, 0, 0.13), 0 11px 0 rgba(53, 76, 57, 0.14);
    }

    .menu-button:active,
    .world-tab:active,
    .tool-button:active,
    .stage-button:active,
    .result-button:active,
    .icon-button:active {
      transform: translateY(4px);
      box-shadow: inset 0 -2px rgba(0, 0, 0, 0.14), 0 3px 0 rgba(53, 76, 57, 0.16);
    }

    .menu-button:disabled,
    .world-tab:disabled,
    .tool-button:disabled,
    .stage-button:disabled,
    .result-button:disabled {
      cursor: not-allowed;
      filter: grayscale(0.25) opacity(0.54);
      transform: none;
    }

    .screen-header,
    .playbar {
      display: grid;
      align-items: center;
      gap: 12px;
      width: min(1180px, calc(100vw - 20px));
      margin: 0 auto;
    }

    .screen-header {
      grid-template-columns: auto 1fr auto;
      padding: 10px 0 8px;
    }

    .screen-title h2,
    .play-title h2 {
      color: #173f35;
      font-size: clamp(1.35rem, 3vw, 2rem);
      letter-spacing: 0;
      line-height: 1;
    }

    .screen-title .mascot,
    .play-title .mascot {
      width: 46px;
    }

    .stage-screen {
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 0 0 10px;
    }

    .stage-shell {
      width: min(900px, calc(100vw - 20px));
      min-height: 0;
      display: grid;
      align-self: center;
      justify-self: center;
      gap: 12px;
      padding: 14px;
    }

    .stage-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: #42645c;
      font-weight: 900;
    }

    .world-tabs {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 9px;
    }

    .world-tab {
      min-height: 58px;
      display: grid;
      align-content: center;
      gap: 3px;
      padding: 8px 10px;
      border: 2px solid rgba(23, 123, 88, 0.18);
      box-shadow: inset 0 -4px rgba(0, 0, 0, 0.12), 0 7px 0 rgba(53, 76, 57, 0.14);
    }

    .world-tab .world-no {
      color: #173f35;
      font-size: 1.02rem;
      line-height: 1;
      font-weight: 950;
    }

    .world-tab .world-rule {
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 900;
    }

    .world-tab.active {
      color: #fff;
      background: linear-gradient(145deg, #62d890, var(--leaf-deep));
      border-color: rgba(23, 123, 88, 0.35);
    }

    .world-tab.active .world-no,
    .world-tab.active .world-rule {
      color: #fff;
    }

    .stage-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .stage-button {
      min-height: 70px;
      display: grid;
      align-content: center;
      gap: 4px;
      padding: 8px;
      border: 2px solid rgba(23, 123, 88, 0.18);
      box-shadow: inset 0 -4px rgba(0, 0, 0, 0.12), 0 7px 0 rgba(53, 76, 57, 0.14);
    }

    .stage-button .stage-no {
      color: #173f35;
      font-size: 1.2rem;
      line-height: 1;
      font-weight: 950;
    }

    .stage-button .stage-meta {
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 900;
    }

    .stage-button.cleared {
      background: #e7f8d7;
      border-color: rgba(23, 123, 88, 0.3);
    }

    .stage-button.current {
      color: #fff;
      background: linear-gradient(145deg, #ff7c5f, var(--coral));
      border-color: rgba(184, 63, 45, 0.28);
    }

    .stage-button.current .stage-no,
    .stage-button.current .stage-meta {
      color: #fff;
    }

    .stage-button.locked {
      background: rgba(255, 253, 244, 0.62);
      box-shadow: inset 0 -4px rgba(0, 0, 0, 0.08);
    }

    .stage-footer {
      width: min(900px, calc(100vw - 20px));
      display: flex;
      justify-content: center;
      margin: 8px auto 0;
    }

    .play-screen {
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr;
      padding: 8px 0 10px;
    }

    .playbar {
      grid-template-columns: auto 1fr auto;
      min-height: 58px;
      padding-bottom: 8px;
    }

    .icon-button {
      width: 46px;
      min-height: 46px;
      padding: 0;
      font-size: 1.5rem;
    }

    .play-title {
      overflow: hidden;
    }

    .play-title h2 {
      white-space: nowrap;
    }

    .stage-chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(255, 253, 244, 0.76);
      color: var(--leaf-dark);
      border: 2px solid rgba(23, 123, 88, 0.18);
      font-size: 0.82rem;
      font-weight: 950;
      white-space: nowrap;
    }

    .remaining-banner {
      min-width: 152px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border: 3px solid rgba(184, 63, 45, 0.22);
      border-radius: var(--radius);
      background: linear-gradient(145deg, #fff1c8, #fff9df);
      box-shadow: 0 12px 22px rgba(184, 63, 45, 0.12);
      color: var(--coral-deep);
      font-weight: 950;
    }

    .remaining-banner span {
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .remaining-banner strong {
      font-size: clamp(1.65rem, 4vw, 2.15rem);
      line-height: 0.9;
    }

    .remaining-banner.warning {
      animation: warning-pulse 800ms ease-in-out infinite;
    }

    .play-area {
      position: relative;
      width: min(1180px, calc(100vw - 20px));
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(250px, 310px);
      gap: clamp(10px, 2vw, 18px);
      align-items: stretch;
      margin: 0 auto;
      overflow: hidden;
    }

    .board-zone {
      min-width: 0;
      min-height: 0;
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 10px;
    }

    .board-frame {
      position: relative;
      width: min(100%, calc(100dvh - 104px), 640px);
      aspect-ratio: 1;
      padding: clamp(8px, 1.6vw, 14px);
      border: 3px solid rgba(23, 123, 88, 0.3);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 253, 244, 0.92), rgba(239, 248, 211, 0.9)),
        repeating-linear-gradient(90deg, rgba(23, 123, 88, 0.08) 0 8px, transparent 8px 16px);
      box-shadow: var(--shadow);
    }

    .tutorial-panel {
      position: fixed;
      left: var(--tutorial-left, 14px);
      top: var(--tutorial-top, 14px);
      z-index: 16;
      width: min(340px, calc(100vw - 24px));
      min-height: 78px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 3px solid rgba(79, 159, 217, 0.2);
      border-radius: var(--radius);
      background: rgba(255, 253, 244, 0.94);
      box-shadow: 0 10px 22px rgba(53, 76, 57, 0.12);
      animation: window-pop 180ms ease both;
    }

    .tutorial-shade {
      position: fixed;
      inset: 0;
      z-index: 12;
      background: rgba(18, 37, 32, 0.54);
      backdrop-filter: blur(1.5px);
      pointer-events: auto;
    }

    .tutorial-copy {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .tutorial-kicker {
      color: var(--coral-deep);
      font-size: 0.7rem;
      font-weight: 950;
      letter-spacing: 0;
    }

    .tutorial-title {
      color: #173f35;
      font-size: 0.98rem;
      font-weight: 950;
      line-height: 1.1;
    }

    .tutorial-text {
      margin: 0;
      color: #42645c;
      font-size: 0.76rem;
      font-weight: 900;
      line-height: 1.3;
    }

    .tutorial-controls {
      display: grid;
      grid-template-columns: auto auto auto;
      align-items: center;
      gap: 6px;
    }

    .tutorial-step {
      min-width: 42px;
      color: #173f35;
      font-size: 0.78rem;
      font-weight: 950;
      text-align: center;
      white-space: nowrap;
    }

    .tutorial-ui-focus {
      position: relative;
      z-index: 14;
      border-radius: var(--radius);
      animation: tutorial-ui-focus 980ms ease-in-out infinite;
    }

    .play-screen.tutorial-reading .tutorial-ui-focus {
      pointer-events: none;
    }

    .play-screen.tutorial-reading .board-frame.tutorial-ui-focus,
    .play-screen.tutorial-reading .target-section.tutorial-ui-focus {
      pointer-events: auto;
    }

    .board {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(var(--size), minmax(0, 1fr));
      gap: clamp(5px, 1vw, 9px);
      width: 100%;
      height: 100%;
    }

    .board-target-overlay {
      position: absolute;
      z-index: 6;
      margin: 0;
      pointer-events: none;
      opacity: 1;
      transform: scale(1);
      filter: drop-shadow(0 0 14px rgba(79, 159, 217, 0.28));
    }

    .board-target-overlay .tile {
      cursor: default;
      opacity: 0.74;
      box-shadow:
        inset 0 0 0 3px rgba(255, 255, 255, 0.72),
        inset 0 0 0 6px rgba(79, 159, 217, 0.44),
        inset 0 -5px rgba(0, 0, 0, 0.11),
        0 0 16px rgba(79, 159, 217, 0.2);
    }

    .board-target-overlay .tile.target-match {
      opacity: 0.32;
      filter: saturate(0.88);
    }

    .board-target-overlay .tile.target-diff {
      opacity: 0.9;
      animation: target-compare-pulse 760ms ease-in-out infinite;
    }

    .tile {
      position: relative;
      display: grid;
      place-items: center;
      width: 100%;
      min-width: 0;
      aspect-ratio: 1;
      border: 0;
      border-radius: var(--radius);
      cursor: pointer;
      overflow: hidden;
      touch-action: manipulation;
      transform-style: preserve-3d;
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
      box-shadow: inset 0 -5px rgba(0, 0, 0, 0.13), inset 0 4px rgba(255, 255, 255, 0.44), 0 7px 0 rgba(53, 76, 57, 0.18);
    }

    .tile::before,
    .tile::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .tile::before {
      inset: 9%;
      border-radius: 7px;
      opacity: 0.42;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.75), transparent 46%);
    }

    .tile.state-0 {
      background:
        radial-gradient(circle at 30% 23%, rgba(255, 255, 255, 0.5) 0 9%, transparent 10%),
        radial-gradient(circle at 78% 82%, rgba(13, 78, 60, 0.22) 0 18%, transparent 19%),
        linear-gradient(145deg, #55cf8a, var(--leaf) 48%, var(--leaf-deep));
    }

    .tile.state-0::after {
      width: 42%;
      height: 20%;
      border-radius: 999px 999px 16px 16px;
      border-bottom: 4px solid rgba(13, 78, 60, 0.56);
      bottom: 23%;
      left: 29%;
      transform: rotate(-4deg);
    }

    .tile.state-1 {
      background:
        radial-gradient(circle at 28% 30%, var(--coral) 0 9%, transparent 10%),
        radial-gradient(circle at 68% 61%, var(--coral) 0 12%, transparent 13%),
        radial-gradient(circle at 54% 25%, rgba(79, 159, 217, 0.75) 0 8%, transparent 9%),
        linear-gradient(145deg, #fffaf0, var(--egg) 55%, var(--egg-shade));
    }

    .tile.state-1::after {
      inset: 15% 18%;
      border: 3px solid rgba(112, 78, 25, 0.14);
      border-radius: 48% 52% 46% 54%;
      transform: rotate(-12deg);
    }

    .tile:hover,
    .tile:focus-visible {
      outline: none;
      filter: saturate(1.08);
      transform: translateY(-3px);
      box-shadow: inset 0 -5px rgba(0, 0, 0, 0.12), inset 0 4px rgba(255, 255, 255, 0.45), 0 11px 0 rgba(53, 76, 57, 0.16);
    }

    .tile.affected {
      box-shadow:
        inset 0 0 0 4px rgba(79, 159, 217, 0.78),
        inset 0 -5px rgba(0, 0, 0, 0.13),
        inset 0 4px rgba(255, 255, 255, 0.44),
        0 7px 0 rgba(53, 76, 57, 0.18);
    }

    .tile.tutorial-affected {
      filter: saturate(1.08) brightness(1.03);
      box-shadow:
        inset 0 0 0 4px rgba(79, 159, 217, 0.86),
        inset 0 -5px rgba(0, 0, 0, 0.13),
        inset 0 4px rgba(255, 255, 255, 0.44),
        0 7px 0 rgba(53, 76, 57, 0.18),
        0 0 14px rgba(79, 159, 217, 0.28);
    }

    .tile.tutorial-settled {
      filter: saturate(1.18) brightness(1.05);
      box-shadow:
        inset 0 0 0 5px rgba(66, 184, 131, 0.96),
        inset 0 0 0 9px rgba(255, 253, 244, 0.64),
        inset 0 -5px rgba(0, 0, 0, 0.13),
        inset 0 4px rgba(255, 255, 255, 0.44),
        0 0 18px rgba(66, 184, 131, 0.3);
    }

    .tile.tutorial-press {
      animation: tutorial-press-pulse 940ms ease-in-out infinite;
      box-shadow:
        inset 0 0 0 5px rgba(240, 100, 73, 0.94),
        inset 0 0 0 9px rgba(255, 241, 200, 0.72),
        inset 0 -5px rgba(0, 0, 0, 0.13),
        inset 0 4px rgba(255, 255, 255, 0.44),
        0 8px 0 rgba(184, 63, 45, 0.2),
        0 0 18px rgba(240, 100, 73, 0.35);
    }

    .tile.flipped {
      animation: tile-flip 300ms ease both;
    }

    .play-area.clear-glow .board::after {
      content: "";
      position: absolute;
      inset: -4px;
      z-index: 4;
      border-radius: var(--radius);
      pointer-events: none;
      background: linear-gradient(115deg, transparent 12%, rgba(255, 253, 244, 0.72) 44%, transparent 70%);
      transform: translateX(-130%);
      animation: board-shine 1080ms ease-out both;
    }

    .tile.hint {
      animation: hint-pulse 780ms ease-in-out infinite;
    }

    .tile.hint-area {
      box-shadow:
        inset 0 0 0 4px rgba(248, 197, 55, 0.86),
        inset 0 -5px rgba(0, 0, 0, 0.13),
        inset 0 4px rgba(255, 255, 255, 0.44),
        0 0 14px rgba(248, 197, 55, 0.22);
    }

    .tile.hint-candidate {
      box-shadow:
        inset 0 0 0 4px rgba(79, 159, 217, 0.9),
        inset 0 0 0 8px rgba(255, 253, 244, 0.58),
        inset 0 -5px rgba(0, 0, 0, 0.13),
        inset 0 4px rgba(255, 255, 255, 0.44),
        0 0 16px rgba(79, 159, 217, 0.24);
    }

    .tile.hint-confirm {
      animation: hint-pulse 780ms ease-in-out infinite;
      box-shadow:
        inset 0 0 0 5px rgba(66, 184, 131, 0.95),
        inset 0 0 0 9px rgba(255, 253, 244, 0.62),
        inset 0 -5px rgba(0, 0, 0, 0.13),
        inset 0 4px rgba(255, 255, 255, 0.44),
        0 0 18px rgba(66, 184, 131, 0.28);
    }

    .tile.hint-answer {
      animation: tutorial-press-pulse 940ms ease-in-out infinite;
      box-shadow:
        inset 0 0 0 5px rgba(240, 100, 73, 0.94),
        inset 0 0 0 9px rgba(255, 241, 200, 0.78),
        inset 0 -5px rgba(0, 0, 0, 0.13),
        inset 0 4px rgba(255, 255, 255, 0.44),
        0 0 20px rgba(240, 100, 73, 0.3);
    }

    .tile.no-touch-hint {
      filter: saturate(0.88) brightness(1.04);
      box-shadow:
        inset 0 0 0 4px rgba(79, 159, 217, 0.92),
        inset 0 -5px rgba(0, 0, 0, 0.13),
        inset 0 4px rgba(255, 255, 255, 0.44),
        0 7px 0 rgba(53, 76, 57, 0.18);
    }

    .tile.no-touch-hint::before {
      inset: 10%;
      opacity: 0.92;
      background: repeating-linear-gradient(
        45deg,
        rgba(79, 159, 217, 0.42) 0 4px,
        rgba(255, 255, 255, 0.25) 4px 8px
      );
    }

    .tile.mismatch {
      animation: mismatch-pulse 620ms ease-in-out infinite;
    }

    .tile:disabled {
      cursor: default;
    }

    .tile-mini {
      border-radius: 5px;
      cursor: default;
      box-shadow: inset 0 -3px rgba(0, 0, 0, 0.13), inset 0 2px rgba(255, 255, 255, 0.44);
    }

    .tile-mini::after {
      display: none;
    }

    .side-panel {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 10px;
      align-content: start;
    }

    .target-section,
    .side-card {
      padding: 10px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .section-head h3 {
      margin: 0;
      color: #173f35;
      font-size: 1rem;
      line-height: 1;
      letter-spacing: 0;
    }

    .section-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .target-count {
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .mini-button {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      border: 0;
      border-radius: var(--radius);
      background: linear-gradient(145deg, #ccecff, var(--sky-soft));
      box-shadow: inset 0 -3px rgba(0, 0, 0, 0.12), 0 5px 0 rgba(53, 76, 57, 0.12);
      color: #11384d;
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 950;
      white-space: nowrap;
    }

    .target-board {
      --size: 4;
      display: grid;
      grid-template-columns: repeat(var(--size), minmax(0, 1fr));
      gap: 5px;
      width: min(100%, 220px);
      aspect-ratio: 1;
      margin: 0 auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .info-item {
      min-height: 48px;
      display: grid;
      align-content: center;
      gap: 3px;
      padding: 7px 8px;
      border: 2px solid rgba(79, 159, 217, 0.2);
      border-radius: var(--radius);
      background: rgba(255, 253, 244, 0.84);
    }

    .info-label {
      color: var(--muted);
      font-size: 0.66rem;
      font-weight: 900;
    }

    .info-value {
      color: #173f35;
      font-size: 1.05rem;
      font-weight: 950;
      line-height: 1;
    }

    .tool-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .tool-button {
      min-height: 42px;
      padding: 0 8px;
      font-size: 0.88rem;
    }

    .dino-guide {
      min-height: 76px;
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
    }

    .guide-dino {
      width: 52px;
      height: auto;
      filter: drop-shadow(0 6px 7px rgba(45, 77, 56, 0.18));
    }

    .guide-dino.speaking {
      animation: dino-talk 520ms ease both;
    }

    .guide-message {
      position: relative;
      min-height: 46px;
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border: 2px solid rgba(79, 159, 217, 0.22);
      border-radius: var(--radius);
      background: #fffaf0;
      color: #345850;
      font-size: 0.82rem;
      font-weight: 950;
      line-height: 1.32;
    }

    .guide-message.speaking {
      animation: bubble-talk 440ms ease both;
    }

    .guide-message::before {
      content: "";
      position: absolute;
      left: -8px;
      top: 21px;
      width: 12px;
      height: 12px;
      border-left: 2px solid rgba(79, 159, 217, 0.22);
      border-bottom: 2px solid rgba(79, 159, 217, 0.22);
      background: #fffaf0;
      transform: rotate(45deg);
    }

    .result-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(28, 49, 43, 0.3);
      backdrop-filter: blur(2px);
    }

    .result-window {
      width: min(360px, 100%);
      display: grid;
      gap: 12px;
      padding: 18px;
      text-align: center;
      animation: window-pop 220ms ease both;
    }

    .target-window {
      width: min(520px, 100%);
      gap: 14px;
    }

    .target-window-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .target-window .icon-button {
      width: 38px;
      min-height: 38px;
      font-size: 1.2rem;
    }

    .target-window .target-zoom-board {
      width: min(76vmin, 440px);
      gap: clamp(5px, 1vmin, 8px);
    }

    .result-window h2 {
      color: #173f35;
      font-size: 1.7rem;
      line-height: 1;
      letter-spacing: 0;
    }

    .result-window p {
      color: #42645c;
      font-weight: 850;
      line-height: 1.45;
    }

    .result-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .burst-layer {
      position: absolute;
      inset: 0;
      z-index: 25;
      pointer-events: none;
      overflow: hidden;
    }

    .confetti {
      position: absolute;
      width: 9px;
      height: 14px;
      border-radius: 2px;
      opacity: 0;
      animation: confetti-fall 900ms ease-out forwards;
    }

    .play-area.clear-glow .board-frame {
      animation: board-win 1080ms ease both;
    }

    @keyframes tile-flip {
      0% {
        transform: rotateY(0deg) translateY(0);
      }
      46% {
        transform: rotateY(86deg) translateY(-2px) scale(0.96);
      }
      100% {
        transform: rotateY(0deg) translateY(0);
      }
    }

    @keyframes warning-pulse {
      0%,
      100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.04);
      }
    }

    @keyframes hint-pulse {
      0%,
      100% {
        filter: saturate(1);
        box-shadow:
          inset 0 0 0 5px rgba(248, 197, 55, 0.94),
          inset 0 -5px rgba(0, 0, 0, 0.13),
          inset 0 4px rgba(255, 255, 255, 0.44),
          0 7px 0 rgba(53, 76, 57, 0.18);
      }
      50% {
        filter: saturate(1.24) brightness(1.08);
        transform: translateY(-2px) scale(1.02);
      }
    }

    @keyframes dino-talk {
      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }
      24% {
        transform: translateY(-3px) rotate(-3deg);
      }
      52% {
        transform: translateY(1px) rotate(2deg);
      }
      78% {
        transform: translateY(-1px) rotate(-1deg);
      }
    }

    @keyframes tutorial-press-pulse {
      0%,
      100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-4px) scale(1.025);
      }
    }

    @keyframes tutorial-ui-focus {
      0%,
      100% {
        box-shadow:
          0 0 0 4px rgba(248, 197, 55, 0.45),
          0 0 18px rgba(248, 197, 55, 0.24);
      }
      50% {
        box-shadow:
          0 0 0 5px rgba(248, 197, 55, 0.78),
          0 0 24px rgba(248, 197, 55, 0.34);
      }
    }

    @keyframes bubble-talk {
      0% {
        transform: translateY(2px) scale(0.98);
        filter: brightness(0.98);
      }
      42% {
        transform: translateY(-2px) scale(1.015);
        filter: brightness(1.04);
      }
      100% {
        transform: translateY(0) scale(1);
        filter: brightness(1);
      }
    }

    @keyframes mismatch-pulse {
      0%,
      100% {
        box-shadow:
          inset 0 0 0 4px rgba(240, 100, 73, 0.92),
          inset 0 -5px rgba(0, 0, 0, 0.13),
          inset 0 4px rgba(255, 255, 255, 0.44),
          0 7px 0 rgba(53, 76, 57, 0.18);
      }
      50% {
        box-shadow:
          inset 0 0 0 7px rgba(248, 197, 55, 0.88),
          inset 0 -5px rgba(0, 0, 0, 0.13),
          inset 0 4px rgba(255, 255, 255, 0.44),
          0 7px 0 rgba(53, 76, 57, 0.18);
      }
    }

    @keyframes target-compare-pulse {
      0%,
      100% {
        filter: saturate(1.04) brightness(1.02);
      }
      50% {
        filter: saturate(1.22) brightness(1.08);
      }
    }

    @keyframes window-pop {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes board-win {
      0%,
      100% {
        filter: saturate(1);
      }
      42% {
        filter: saturate(1.35) brightness(1.08);
        box-shadow: 0 0 0 8px rgba(248, 197, 55, 0.28), var(--shadow);
      }
    }

    @keyframes board-shine {
      0% {
        opacity: 0;
        transform: translateX(-130%);
      }
      18% {
        opacity: 0.9;
      }
      100% {
        opacity: 0;
        transform: translateX(130%);
      }
    }

    @keyframes confetti-fall {
      0% {
        opacity: 1;
        transform: translate3d(0, 0, 0) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translate3d(var(--dx), var(--dy), 0) rotate(var(--rot));
      }
    }

    @media (max-width: 760px) {
      .menu-layout {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .menu-card {
        width: min(100%, 340px);
        justify-self: center;
      }

      .screen-header {
        grid-template-columns: auto 1fr;
      }

      .screen-header .menu-button {
        grid-column: 1 / -1;
      }

      .stage-shell {
        padding: 10px;
        gap: 9px;
      }

      .stage-grid {
        gap: 7px;
      }

      .world-tabs {
        gap: 7px;
      }

      .world-tab {
        min-height: 48px;
        padding: 6px;
      }

      .world-tab .world-no {
        font-size: 0.88rem;
      }

      .world-tab .world-rule {
        font-size: 0.58rem;
      }

      .stage-button {
        min-height: 58px;
        padding: 6px;
      }

      .stage-button .stage-no {
        font-size: 1rem;
      }

      .stage-button .stage-meta {
        font-size: 0.64rem;
      }

      .playbar {
        grid-template-columns: auto 1fr auto;
        gap: 8px;
        min-height: 52px;
      }

      .play-title .mascot {
        display: none;
      }

      .play-title h2 {
        font-size: 1.12rem;
      }

      .stage-chip {
        min-height: 26px;
        padding: 0 7px;
        font-size: 0.72rem;
      }

      .remaining-banner {
        min-width: 114px;
        gap: 6px;
        padding: 6px 8px;
      }

      .remaining-banner span {
        font-size: 0.68rem;
      }

      .remaining-banner strong {
        font-size: 1.55rem;
      }

      .play-area {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 8px;
      }

      .board-frame {
        width: min(100%, calc(100dvh - 304px));
        padding: 8px;
      }

      .board {
        gap: 5px;
      }

      .tutorial-panel {
        min-height: 64px;
        grid-template-columns: minmax(0, 1fr) 112px;
        gap: 6px;
        padding: 7px 8px;
      }

      .tutorial-kicker {
        display: none;
      }

      .tutorial-title {
        font-size: 0.82rem;
      }

      .tutorial-text {
        font-size: 0.68rem;
        line-height: 1.22;
      }

      .tutorial-controls {
        grid-template-columns: 30px 42px 30px;
        justify-content: end;
        gap: 4px;
      }

      .tutorial-controls .mini-button {
        min-height: 26px;
        padding: 0 4px;
      }

      .side-panel {
        grid-template-columns: 126px 1fr;
        grid-template-rows: auto auto;
        gap: 8px;
      }

      .target-section {
        grid-row: 1 / span 2;
        padding: 8px;
      }

      .target-board {
        width: 108px;
        gap: 4px;
      }

      .mini-button {
        min-height: 26px;
        padding: 0 7px;
        font-size: 0.66rem;
      }

      .target-window .target-zoom-board {
        width: min(calc(100vw - 52px), calc(100dvh - 190px), 430px);
        gap: 5px;
      }

      .side-card {
        padding: 8px;
      }

      .info-grid {
        gap: 6px;
      }

      .info-item {
        min-height: 42px;
        padding: 5px 6px;
      }

      .info-label {
        font-size: 0.58rem;
      }

      .info-value {
        font-size: 0.9rem;
      }

      .tool-row {
        gap: 6px;
      }

      .tool-button {
        min-height: 38px;
        font-size: 0.78rem;
        padding: 0 5px;
      }

      .dino-guide {
        grid-column: 1 / -1;
        min-height: 50px;
        grid-template-columns: 38px minmax(0, 1fr);
        gap: 8px;
        padding: 6px 8px;
      }

      .guide-dino {
        width: 38px;
      }

      .guide-message {
        min-height: 36px;
        padding: 5px 8px;
        font-size: 0.72rem;
        line-height: 1.24;
      }

      .guide-message::before {
        top: 15px;
      }
    }

    @media (max-width: 430px) {
      .play-area,
      .playbar,
      .screen-header,
      .stage-shell,
      .stage-footer {
        width: calc(100vw - 14px);
      }

      .side-panel {
        grid-template-columns: 112px 1fr;
      }

      .target-board {
        width: 94px;
      }

      .result-window {
        padding: 14px;
      }
    }

    @media (max-width: 390px) {
      .playbar {
        gap: 5px;
        min-height: 48px;
      }

      .icon-button {
        width: 40px;
        min-height: 40px;
        font-size: 1.25rem;
      }

      .play-title h2 {
        font-size: 0.92rem;
      }

      .stage-chip {
        min-height: 22px;
        padding: 0 5px;
        font-size: 0.62rem;
      }

      .remaining-banner {
        min-width: 96px;
        padding: 5px 6px;
      }

      .remaining-banner span {
        font-size: 0.6rem;
      }

      .remaining-banner strong {
        font-size: 1.35rem;
      }

      .play-area {
        gap: 6px;
      }

      .board-frame {
        width: min(100%, max(206px, calc(100dvh - 308px)));
        padding: 7px;
      }

      .tutorial-panel {
        grid-template-columns: minmax(0, 1fr) 98px;
        padding: 6px 7px;
      }

      .tutorial-title {
        font-size: 0.76rem;
      }

      .tutorial-text {
        font-size: 0.64rem;
      }

      .tutorial-controls {
        grid-template-columns: 27px 38px 27px;
        gap: 3px;
      }

      .side-panel {
        grid-template-columns: 102px 1fr;
        gap: 6px;
      }

      .target-section,
      .side-card {
        padding: 6px;
      }

      .section-head {
        gap: 5px;
        margin-bottom: 5px;
      }

      .section-head h3 {
        font-size: 0.84rem;
      }

      .section-actions {
        gap: 4px;
      }

      .target-count {
        font-size: 0.62rem;
      }

      .target-board {
        width: 82px;
        gap: 3px;
      }

      .info-grid {
        gap: 5px;
      }

      .info-item {
        min-height: 36px;
        padding: 4px 5px;
      }

      .info-label {
        font-size: 0.54rem;
      }

      .info-value {
        font-size: 0.82rem;
      }

      .tool-row {
        gap: 5px;
      }

      .tool-button {
        min-height: 34px;
        font-size: 0.68rem;
      }

      .dino-guide {
        min-height: 44px;
        grid-template-columns: 32px minmax(0, 1fr);
        gap: 6px;
      }

      .guide-dino {
        width: 32px;
      }

      .guide-message {
        min-height: 32px;
        padding: 5px 7px;
        font-size: 0.66rem;
        line-height: 1.2;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="menuScreen" class="screen menu-screen" aria-label="メインメニュー">
      <div class="menu-layout">
        <div class="brand">
          <div class="brand-row">
            <svg class="mascot" viewBox="0 0 96 96" role="img" aria-label="Green dinosaur and egg mark">
              <path d="M56 7c15 0 27 11 27 26 0 12-8 22-19 25l4 16c1 5-3 10-8 10H23c-6 0-10-6-8-11l7-23c-5-4-8-10-8-17C14 18 27 7 43 7h13Z" fill="#42b883"/>
              <path d="M20 34c0-13 10-22 23-22h11c13 0 23 9 23 21 0 13-10 22-23 22H42c-13 0-22-9-22-21Z" fill="#55cf8a"/>
              <circle cx="58" cy="30" r="5" fill="#15352f"/>
              <circle cx="60" cy="28" r="1.5" fill="#fff"/>
              <path d="M34 41c8 7 20 7 28 0" fill="none" stroke="#0d4e3c" stroke-width="4" stroke-linecap="round"/>
              <path d="M24 77c3-18 13-29 26-29s23 11 26 29c1 6-4 12-10 12H34c-6 0-11-6-10-12Z" fill="#fff6db" stroke="#e4c877" stroke-width="3"/>
              <circle cx="47" cy="64" r="7" fill="#f06449"/>
              <circle cx="61" cy="78" r="8" fill="#f06449"/>
              <circle cx="37" cy="80" r="5" fill="#4f9fd9"/>
            </svg>
            <h1>Dino Panel Flip</h1>
          </div>
          <p class="tagline">WORLDごとに変わる反転ルールで、きれいな模様へ戻すパネルパズル</p>
        </div>

        <div class="menu-card">
          <div class="progress-pill">
            <span>選択中</span>
            <strong id="menuStageValue">S1</strong>
          </div>
          <button id="startButton" class="menu-button primary" type="button">はじめる</button>
          <button id="selectButton" class="menu-button sky" type="button">ステージ選択</button>
          <button id="resetProgressButton" class="menu-button" type="button">記録リセット</button>
        </div>
      </div>
    </section>

    <section id="stageScreen" class="screen stage-screen hidden" aria-label="ステージ選択">
      <header class="screen-header">
        <div class="screen-title">
          <svg class="mascot" viewBox="0 0 96 96" aria-hidden="true">
            <path d="M56 7c15 0 27 11 27 26 0 12-8 22-19 25l4 16c1 5-3 10-8 10H23c-6 0-10-6-8-11l7-23c-5-4-8-10-8-17C14 18 27 7 43 7h13Z" fill="#42b883"/>
            <path d="M20 34c0-13 10-22 23-22h11c13 0 23 9 23 21 0 13-10 22-23 22H42c-13 0-22-9-22-21Z" fill="#55cf8a"/>
            <circle cx="58" cy="30" r="5" fill="#15352f"/>
            <path d="M34 41c8 7 20 7 28 0" fill="none" stroke="#0d4e3c" stroke-width="4" stroke-linecap="round"/>
          </svg>
          <h2>Stage Select</h2>
        </div>
        <span id="stageSummary" class="stage-chip">S1 open</span>
        <button id="homeFromStagesButton" class="menu-button" type="button">メニュー</button>
      </header>

      <div class="stage-shell">
        <div id="worldTabs" class="world-tabs" role="tablist" aria-label="ワールド選択"></div>
        <div class="stage-summary">
          <span>各WORLDのSTAGE1は最初から選べます</span>
          <span id="unlockedSummary">S1</span>
        </div>
        <div id="stageGrid" class="stage-grid"></div>
      </div>

      <div class="stage-footer">
        <button id="quickCurrentButton" class="menu-button primary" type="button">挑戦中へ</button>
      </div>
    </section>

    <section id="playScreen" class="screen play-screen hidden" aria-label="プレイ画面">
      <header class="playbar">
        <button id="backToStagesButton" class="icon-button" type="button" title="ステージ選択へ">‹</button>
        <div class="play-title">
          <svg class="mascot" viewBox="0 0 96 96" aria-hidden="true">
            <path d="M56 7c15 0 27 11 27 26 0 12-8 22-19 25l4 16c1 5-3 10-8 10H23c-6 0-10-6-8-11l7-23c-5-4-8-10-8-17C14 18 27 7 43 7h13Z" fill="#42b883"/>
            <path d="M20 34c0-13 10-22 23-22h11c13 0 23 9 23 21 0 13-10 22-23 22H42c-13 0-22-9-22-21Z" fill="#55cf8a"/>
            <circle cx="58" cy="30" r="5" fill="#15352f"/>
            <path d="M34 41c8 7 20 7 28 0" fill="none" stroke="#0d4e3c" stroke-width="4" stroke-linecap="round"/>
          </svg>
          <h2>WORLD <span id="worldValue">1</span> - STAGE <span id="stageValue">1</span></h2>
          <span id="sizeValue" class="stage-chip">4x4</span>
          <span id="ruleValue" class="stage-chip">9マス</span>
        </div>
        <div id="remainingBanner" class="remaining-banner">
          <span>残り手数</span>
          <strong id="remainingValue">0</strong>
        </div>
      </header>

      <div id="tutorialShade" class="tutorial-shade hidden" aria-hidden="true"></div>

      <section id="playArea" class="play-area">
        <div class="board-zone">
          <div class="board-frame">
            <div id="board" class="board" aria-label="現在の盤面"></div>
            <div id="targetHoldOverlay" class="board board-target-overlay hidden" aria-hidden="true"></div>
          </div>
          <div id="tutorialPanel" class="tutorial-panel hidden" aria-live="polite">
            <div class="tutorial-copy">
              <span class="tutorial-kicker">チュートリアル</span>
              <strong id="tutorialTitle" class="tutorial-title">押す場所を見てみよう</strong>
              <p id="tutorialText" class="tutorial-text">オレンジの枠を押すと、青く光る場所がひっくり返ります。</p>
            </div>
            <div class="tutorial-controls">
              <button id="tutorialPrevButton" class="mini-button" type="button">前</button>
              <span id="tutorialStepValue" class="tutorial-step">1 / 1</span>
              <button id="tutorialNextButton" class="mini-button" type="button">次</button>
            </div>
          </div>
        </div>

        <aside class="side-panel" aria-label="ゲーム情報">
          <section class="target-section" aria-label="お題">
            <div class="section-head">
              <h3>お題</h3>
