        tutorialStep: 0,
        history: [],
        flipTimer: 0,
        failTimer: 0,
        clearTimer: 0,
        guidePulseTimer: 0,
        audioContext: null
      };

      const matrixCache = new Map();

      function readProgress() {
        try {
          const stored = JSON.parse(window.localStorage.getItem(PROGRESS_KEY));
          if (stored && typeof stored === "object") return normalizeProgress(stored);

          const oldValue = Number(window.localStorage.getItem(OLD_PROGRESS_KEY));
          const migrated = defaultProgress(1);
          if (Number.isFinite(oldValue)) migrated.unlocked["1"] = clamp(oldValue, 1, totalStagesFor(1));
          return migrated;
        } catch {
          return defaultProgress(1);
        }
      }

      function writeProgress() {
        try {
          window.localStorage.setItem(PROGRESS_KEY, JSON.stringify(state.progress));
        } catch {
          // localStorage can be unavailable in private contexts.
        }
      }

      function defaultProgress(selectedWorld = 1) {
        const unlocked = {};
        WORLD_CONFIGS.forEach((world) => {
          unlocked[String(world.id)] = 1;
        });
        return {
          selectedWorld: clamp(selectedWorld, 1, TOTAL_WORLDS),
          unlocked,
          failures: {}
        };
      }

      function normalizeProgress(progress) {
        const normalized = defaultProgress(Number(progress.selectedWorld) || 1);
        if (progress.unlocked && typeof progress.unlocked === "object") {
          WORLD_CONFIGS.forEach((world) => {
            const value = Number(progress.unlocked[String(world.id)]);
            normalized.unlocked[String(world.id)] = Number.isFinite(value) ? clamp(value, 1, totalStagesFor(world.id)) : 1;
          });
        }
        if (progress.failures && typeof progress.failures === "object") {
          Object.entries(progress.failures).forEach(([key, value]) => {
            const count = Number(value);
            const [worldId, stageId] = key.split("-").map(Number);
            if (worldConfig(worldId).id === worldId && stageId >= 1 && stageId <= totalStagesFor(worldId) && Number.isFinite(count)) {
              normalized.failures[key] = Math.max(0, Math.floor(count));
            }
          });
        }
        return normalized;
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function worldConfig(world = state.world) {
        return WORLD_CONFIGS.find((config) => config.id === world) || WORLD_CONFIGS[0];
      }

      function worldShortLabel(world = state.world) {
        return worldConfig(world).shortLabel || `W${world}`;
      }

      function worldTitleLabel(world = state.world) {
        return world === 5 ? "EXTRA" : world;
      }

      function stageConfigsFor(world = state.world) {
        return worldConfig(world).stages || STAGE_CONFIGS;
      }

      function totalStagesFor(world = state.world) {
        return stageConfigsFor(world).length;
      }

      function stageConfig(stage, world = state.world) {
        const configs = stageConfigsFor(world);
        return configs[stage - 1] || configs[0];
      }

      function stageSize(stage, world = state.world) {
        return stageConfig(stage, world).size;
      }

      function stageMoveCount(stage, world = state.world) {
        return stageConfig(stage, world).moves;
      }

      function stageGroupLabel(stage, world = state.selectedWorld) {
        const size = stageSize(stage, world);
        const start = Math.floor((stage - 1) / 5) * 5 + 1;
        const end = Math.min(start + 4, totalStagesFor(world));
        return `S${start}-S${end}: ${size} x ${size}`;
      }

      function maxUnlockedFor(world = state.selectedWorld) {
        const value = Number(state.progress.unlocked[String(world)]);
        return Number.isFinite(value) ? clamp(value, 1, totalStagesFor(world)) : 1;
      }

      function setMaxUnlockedFor(world, value) {
        state.progress.unlocked[String(world)] = clamp(value, 1, totalStagesFor(world));
      }

      function stageKey(world = state.world, stage = state.stage) {
        return `${world}-${stage}`;
      }

      function failureCountFor(world = state.world, stage = state.stage) {
        const value = Number(state.progress.failures[stageKey(world, stage)]);
        return Number.isFinite(value) ? Math.max(0, Math.floor(value)) : 0;
      }

      function setFailureCountFor(world, stage, count) {
        state.progress.failures[stageKey(world, stage)] = Math.max(0, Math.floor(count));
      }

      function incrementFailureCount() {
        setFailureCountFor(state.world, state.stage, failureCountFor() + 1);
        writeProgress();
      }

      function hintUnlocked() {
        return failureCountFor() >= HINT_UNLOCK_FAILURES;
      }

      function emptyHintHighlights() {
        return {
          area: new Set(),
          candidate: new Set(),
          confirm: new Set(),
          answer: new Set(),
          noTouch: new Set()
        };
      }

      function clearHintState() {
        state.hintIndices = new Set();
        state.hintHighlights = emptyHintHighlights();
        state.hintMessage = "";
        state.hintActive = false;
      }

      function showScreen(name) {
        state.screen = name;
        menuScreen.classList.toggle("hidden", name !== "menu");
        stageScreen.classList.toggle("hidden", name !== "stage");
        playScreen.classList.toggle("hidden", name !== "play");
        if (name !== "play") {
          window.clearTimeout(state.clearTimer);
          state.clearTimer = 0;
          hideTargetOverlay();
          hideTargetHoldOverlay();
        }
        if (name === "menu") renderMenu();
        if (name === "stage") renderStageSelect();
      }

      function renderMenu() {
        menuStageValue.textContent = `${worldShortLabel(state.selectedWorld)} S${maxUnlockedFor(state.selectedWorld)}`;
      }

      function renderStageSelect() {
        renderWorldTabs();
        stageGrid.textContent = "";
        const selectedWorld = worldConfig(state.selectedWorld);
        const maxUnlocked = maxUnlockedFor(state.selectedWorld);
        const totalStages = totalStagesFor(state.selectedWorld);
        stageSummary.textContent = `${selectedWorld.label} / ${selectedWorld.ruleLabel}`;
        unlockedSummary.textContent = stageGroupLabel(maxUnlocked);
        quickCurrentButton.textContent = `${worldShortLabel(state.selectedWorld)} S${maxUnlocked}へ`;

        for (let stage = 1; stage <= totalStages; stage += 1) {
          const button = document.createElement("button");
          const unlocked = stage <= maxUnlocked;
          const cleared = stage < maxUnlocked;
          const current = stage === maxUnlocked;
          button.type = "button";
          button.className = [
            "stage-button",
            cleared ? "cleared" : "",
            current ? "current" : "",
            unlocked ? "" : "locked"
          ].filter(Boolean).join(" ");
          button.disabled = !unlocked;
          button.setAttribute("aria-label", `${selectedWorld.label} ステージ${stage} ${stageSize(stage, state.selectedWorld)}x${stageSize(stage, state.selectedWorld)} 最短${stageMoveCount(stage, state.selectedWorld)}手`);
          button.innerHTML = `<span class="stage-no">S${stage}</span> <span class="stage-meta">${stageSize(stage, state.selectedWorld)}x${stageSize(stage, state.selectedWorld)} / ${stageMoveCount(stage, state.selectedWorld)}手</span>`;
          button.addEventListener("click", () => startStage(stage, state.selectedWorld));
          stageGrid.append(button);
        }
      }

      function renderWorldTabs() {
        worldTabs.textContent = "";
        WORLD_CONFIGS.forEach((world) => {
          const button = document.createElement("button");
          const active = world.id === state.selectedWorld;
          button.type = "button";
          button.className = ["world-tab", active ? "active" : ""].filter(Boolean).join(" ");
          button.setAttribute("role", "tab");
          button.setAttribute("aria-selected", active ? "true" : "false");
          button.innerHTML = `<span class="world-no">${worldShortLabel(world.id)}</span> <span class="world-rule">${world.ruleLabel} / S${maxUnlockedFor(world.id)} open</span>`;
          button.addEventListener("click", () => {
            state.selectedWorld = world.id;
            state.progress.selectedWorld = world.id;
            writeProgress();
            renderMenu();
            renderStageSelect();
          });
          worldTabs.append(button);
        });
      }

      function startStage(stage, world = state.selectedWorld) {
        if (stage > maxUnlockedFor(world) || stage > totalStagesFor(world)) return;
        state.world = world;
        state.selectedWorld = world;
        state.progress.selectedWorld = world;
        state.stage = stage;
        writeProgress();
        createPuzzle();
        showScreen("play");
      }

      function createPuzzle() {
        const config = stageConfig(state.stage, state.world);
        const puzzle = makePuzzleForStage(config, state.stage, state.world);

        state.size = config.size;
        state.target = puzzle.target;
        state.board = puzzle.board;
        state.initial = puzzle.board.slice();
        state.solution = puzzle.solution;
        state.minimumMoves = puzzle.minimumMoves;
        state.moves = 0;
        state.startedAt = Date.now();
        state.elapsedBeforeResult = 0;
        state.completed = false;
        state.failed = false;
        state.hoveredIndex = null;
        clearHintState();
        state.lastFlipped = new Set();
        state.tutorialStep = 0;
        state.history = [];
        window.clearTimeout(state.flipTimer);
        window.clearTimeout(state.failTimer);
        window.clearTimeout(state.clearTimer);
        window.clearTimeout(state.guidePulseTimer);
        hideTargetOverlay();
        hideTargetHoldOverlay();
        hideResult();
        renderPlay();
      }

      function makePuzzleForStage(config, stage, world) {
        if (config.kind === "tutorial" && config.solution) {
          const tutorial = makeTutorialPuzzle(config, world);
          if (tutorial) return tutorial;
        }
        const target = makeTarget(config.size, stage, world);
        return makePuzzleWithExactMinimum(config.size, target, config.moves, world);
      }

      function makeTutorialPuzzle(config, world) {
        const total = config.size * config.size;
        const diff = Array(total).fill(0);
        config.solution.forEach((move) => flipAt(diff, move, config.size, world));
        const solution = solveMinimum(config.size, diff, world);
        if (!solution || solution.weight !== config.moves) return null;
        return {
          board: Array(total).fill(0),
          target: diff,
          solution: solution.vector,
          minimumMoves: solution.weight
        };
      }

      function makePuzzleWithExactMinimum(size, target, targetMoves, world) {
        const total = size * size;
        for (let attempt = 0; attempt < 500; attempt += 1) {
          const moves = sampleDistinct(total, targetMoves);
          const diff = Array(total).fill(0);
          moves.forEach((move) => flipAt(diff, move, size, world));
          const solution = solveMinimum(size, diff, world);
          if (solution && solution.weight === targetMoves) {
            return {
              board: target.map((value, index) => value ^ diff[index]),
              target,
              solution: solution.vector,
              minimumMoves: solution.weight
            };
          }
        }

        const fallbackMoves = sampleDistinct(total, targetMoves);
        const diff = Array(total).fill(0);
        fallbackMoves.forEach((move) => flipAt(diff, move, size, world));
        const solution = solveMinimum(size, diff, world);
        return {
          board: target.map((value, index) => value ^ diff[index]),
          target,
          solution: solution.vector,
          minimumMoves: solution.weight
        };
      }

      function sampleDistinct(total, count) {
        const values = Array.from({ length: total }, (_, index) => index);
        for (let i = values.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [values[i], values[j]] = [values[j], values[i]];
        }
        return values.slice(0, count);
      }

      function makeTarget(size, stage, world = state.world) {
        const mode = (stage - 1 + (world - 1) * 2) % 8;
        const target = [];
        const center = (size - 1) / 2;
        for (let row = 0; row < size; row += 1) {
          for (let col = 0; col < size; col += 1) {
            const mirrorRow = Math.min(row, size - 1 - row);
            const mirrorCol = Math.min(col, size - 1 - col);
            const dist = Math.abs(row - center) + Math.abs(col - center);
            const ring = Math.max(Math.abs(row - center), Math.abs(col - center));
            let value = false;

            if (mode === 0) value = row === 0 || col === 0 || row === size - 1 || col === size - 1;
            if (mode === 1) value = dist <= Math.floor(size / 2);
            if (mode === 2) value = row === col || row + col === size - 1;
            if (mode === 3) value = Math.abs(row - center) < 0.75 || Math.abs(col - center) < 0.75;
            if (mode === 4) value = (mirrorRow + mirrorCol) % 2 === 0;
            if (mode === 5) value = ring > size * 0.18 && ring < size * 0.48;
            if (mode === 6) value = mirrorRow === 0 || mirrorCol === 0 || dist <= 1.4;
            if (mode === 7) value = Math.abs(row - center) === Math.abs(col - center) || dist <= 1.2;

            target.push(value ? 1 : 0);
          }
        }
        return normalizeTarget(target, size);
      }

      function normalizeTarget(target, size) {
        const ones = target.reduce((sum, value) => sum + value, 0);
        if (ones > 0 && ones < target.length) return target;
        return target.map((_, index) => {
          const row = Math.floor(index / size);
          const col = index % size;
          return (row + col) % 2 ? 1 : 0;
        });
      }

      function getAffectedIndices(index, size = state.size, world = state.world) {
        const row = Math.floor(index / size);
        const col = index % size;
        const directionsByRule = {
          square: [
            [-1, -1], [-1, 0], [-1, 1],
            [0, -1], [0, 0], [0, 1],
            [1, -1], [1, 0], [1, 1]
          ],
          cross: [
            [-1, 0],
            [0, -1], [0, 0], [0, 1],
            [1, 0]
          ],
          diagonal: [
            [-1, -1], [-1, 1],
            [0, 0],
            [1, -1], [1, 1]
          ]
        };
        const directions = directionsByRule[worldConfig(world).rule] || directionsByRule.square;
        const affected = [];
        directions.forEach(([dr, dc]) => {
          const nextRow = row + dr;
          const nextCol = col + dc;
          if (nextRow >= 0 && nextRow < size && nextCol >= 0 && nextCol < size) {
            affected.push(nextRow * size + nextCol);
          }
        });
        return affected;
      }

      function flipAt(board, index, size = state.size, world = state.world) {
        const flipped = getAffectedIndices(index, size, world);
        flipped.forEach((affectedIndex) => {
          board[affectedIndex] = board[affectedIndex] ? 0 : 1;
        });
        return flipped;
      }

      function solveMinimum(size, diff, world = state.world) {
        const total = size * size;
        const matrix = buildMatrix(size, world).map((row, index) => row.concat(diff[index]));
        let pivotRow = 0;
        const pivotCols = [];

        for (let col = 0; col < total && pivotRow < total; col += 1) {
          let selected = -1;
          for (let row = pivotRow; row < total; row += 1) {
            if (matrix[row][col]) {
              selected = row;
              break;
            }
          }
          if (selected === -1) continue;
          [matrix[pivotRow], matrix[selected]] = [matrix[selected], matrix[pivotRow]];

          for (let row = 0; row < total; row += 1) {
            if (row !== pivotRow && matrix[row][col]) {
              for (let k = col; k <= total; k += 1) {
                matrix[row][k] ^= matrix[pivotRow][k];
              }
            }
          }
          pivotCols[pivotRow] = col;
          pivotRow += 1;
        }

        for (let row = 0; row < total; row += 1) {
          const hasCoefficient = matrix[row].slice(0, total).some(Boolean);
          if (!hasCoefficient && matrix[row][total]) return null;
        }

        const pivotSet = new Set(pivotCols);
        const freeCols = [];
        for (let col = 0; col < total; col += 1) {
          if (!pivotSet.has(col)) freeCols.push(col);
        }

        const particular = Array(total).fill(0);
        for (let row = 0; row < pivotRow; row += 1) {
          particular[pivotCols[row]] = matrix[row][total];
        }

        let best = particular;
        let bestWeight = weightOf(best);
        const basis = freeCols.map((freeCol) => {
          const vector = Array(total).fill(0);
          vector[freeCol] = 1;
          for (let row = 0; row < pivotRow; row += 1) {
            if (matrix[row][freeCol]) vector[pivotCols[row]] = 1;
          }
          return vector;
        });

        const variants = 1 << basis.length;
        for (let mask = 1; mask < variants; mask += 1) {
          const candidate = particular.slice();
          for (let i = 0; i < basis.length; i += 1) {
            if (mask & (1 << i)) {
              for (let col = 0; col < total; col += 1) {
                candidate[col] ^= basis[i][col];
              }
            }
          }
          const weight = weightOf(candidate);
          if (weight < bestWeight) {
            best = candidate;
            bestWeight = weight;
          }
        }

        return {
          vector: best,
          weight: bestWeight
        };
      }

      function buildMatrix(size, world = state.world) {
        const cacheKey = `${world}-${size}`;
        if (matrixCache.has(cacheKey)) return matrixCache.get(cacheKey);
        const total = size * size;
        const matrix = Array.from({ length: total }, (_, row) => {
          const values = Array(total).fill(0);
          for (let col = 0; col < total; col += 1) {
            if (getAffectedIndices(col, size, world).includes(row)) values[col] = 1;
          }
          return values;
        });
        matrixCache.set(cacheKey, matrix);
        return matrix;
      }

      function weightOf(values) {
        return values.reduce((sum, value) => sum + (value ? 1 : 0), 0);
      }

      function performMove(index) {
        if (state.completed || state.failed) return;
        const tutorialPage = currentIntroTutorialPage();
        const tutorialMove = currentIntroTutorialMove();
        const followsTutorial = tutorialMove === index;
        if (tutorialMove !== null && !followsTutorial) {
          setGuideMessage("オレンジの枠のマスを押してみよう。まずは1つずつ動きを見れば大丈夫。");
          return;
        }
        unlockAudio();
        playFlipSound();
        const before = state.board.slice();
        const flipped = flipAt(state.board, index);
        state.history.push(before);
        state.moves += 1;
        state.hoveredIndex = null;
        clearHintState();
        state.lastFlipped = new Set(flipped);
        if (followsTutorial) {
          state.tutorialStep = nextTutorialStepAfterMove(tutorialPage.moveIndex);
        }
        window.clearTimeout(state.flipTimer);
        state.flipTimer = window.setTimeout(() => {
          state.lastFlipped = new Set();
          renderBoards();
        }, 320);

        if (isSolved()) {
          finishStage();
        } else if (remainingMoves() <= 0) {
          failStage();
        }
        renderPlay();
      }

      function undoMove() {
        if (!state.history.length || state.completed || state.failed) return;
        state.board = state.history.pop();
        state.moves = Math.max(0, state.moves - 1);
        clearHintState();
        state.lastFlipped = new Set();
        if (isIntroTutorialStage()) {
          state.tutorialStep = tutorialStepForMoveCount(state.moves);
        }
        renderPlay();
      }

      function retryStage(options = {}) {
        const shouldCountHint = options && options.countHint === true && !state.failed && !state.completed;
        if (shouldCountHint) incrementFailureCount();
        state.board = state.initial.slice();
        state.history = [];
        state.moves = 0;
        state.startedAt = Date.now();
        state.elapsedBeforeResult = 0;
        state.completed = false;
        state.failed = false;
        state.hoveredIndex = null;
        clearHintState();
        state.lastFlipped = new Set();
        state.tutorialStep = 0;
        window.clearTimeout(state.failTimer);
        window.clearTimeout(state.clearTimer);
        window.clearTimeout(state.guidePulseTimer);
        hideTargetOverlay();
        hideTargetHoldOverlay();
        hideResult();
        renderPlay();
      }

      function currentSolutionData() {
        const solution = solveMinimum(state.size, currentDiff(), state.world);
        const indices = solution
          ? solution.vector.map((value, index) => value ? index : -1).filter((index) => index >= 0)
          : [];
        return { solution, indices };
      }

      function coordinateList(indices, limit = indices.length) {
        const shown = indices.slice(0, limit).map(coordinateLabel);
        const suffix = indices.length > limit ? ` ほか${indices.length - limit}マス` : "";
        return `${shown.join("、")}${suffix}`;
      }

      function verticalLabel(row) {
        if (row === 0) return "上端";
        if (row === state.size - 1) return "下端";
        const center = (state.size - 1) / 2;
        if (state.size % 2 === 1 && row === Math.floor(center)) return "中央";
        return row < center ? `上から${row + 1}段目` : `下から${state.size - row}段目`;
      }

      function horizontalLabel(col) {
        if (col === 0) return "左端";
        if (col === state.size - 1) return "右端";
        const center = (state.size - 1) / 2;
        if (state.size % 2 === 1 && col === Math.floor(center)) return "中央";
        return col < center ? `左から${col + 1}番目` : `右から${state.size - col}番目`;
      }

      function coordinateLabel(index) {
        const row = Math.floor(index / state.size);
        const col = index % state.size;
        return `${verticalLabel(row)}・${horizontalLabel(col)}`;
      }

      function lineLabel(axis, index) {
        return axis === "row" ? verticalLabel(index) : horizontalLabel(index);
      }

      function rowIndices(row) {
        return Array.from({ length: state.size }, (_, col) => row * state.size + col);
      }

      function colIndices(col) {
        return Array.from({ length: state.size }, (_, row) => row * state.size + col);
      }

      function edgeBandIndices() {
        const indices = [];
        for (let row = 0; row < state.size; row += 1) {
          for (let col = 0; col < state.size; col += 1) {
            if (row === 0 || col === 0 || row === state.size - 1 || col === state.size - 1) {
              indices.push(row * state.size + col);
            }
          }
        }
        return indices;
      }

      function cornerControlIndices() {
        const points = [
          [0, 0], [0, state.size - 2],
          [state.size - 2, 0], [state.size - 2, state.size - 2]
        ];
        const indices = new Set();
        points.forEach(([startRow, startCol]) => {
          for (let row = startRow; row <= startRow + 1; row += 1) {
            for (let col = startCol; col <= startCol + 1; col += 1) {
              if (row >= 0 && row < state.size && col >= 0 && col < state.size) {
                indices.add(row * state.size + col);
              }
            }
          }
        });
        return [...indices];
      }

      function topHalfIndices() {
        const end = Math.max(1, Math.ceil(state.size / 2));
        return Array.from({ length: end * state.size }, (_, index) => index);
      }

      function bottomHalfIndices() {
        const start = Math.floor(state.size / 2);
        const indices = [];
        for (let row = start; row < state.size; row += 1) indices.push(...rowIndices(row));
        return indices;
      }

      function leftHalfIndices() {
        const end = Math.max(1, Math.ceil(state.size / 2));
        const indices = [];
        for (let row = 0; row < state.size; row += 1) {
          for (let col = 0; col < end; col += 1) indices.push(row * state.size + col);
        }
        return indices;
      }

      function rightHalfIndices() {
        const start = Math.floor(state.size / 2);
        const indices = [];
        for (let row = 0; row < state.size; row += 1) {
          for (let col = start; col < state.size; col += 1) indices.push(row * state.size + col);
        }
        return indices;
      }

      function countInside(source, area) {
        const areaSet = new Set(area);
        return source.reduce((sum, index) => sum + (areaSet.has(index) ? 1 : 0), 0);
      }

      function strongestHintArea(solutionIndices) {
        const groups = [
          { label: "上側", indices: topHalfIndices() },
          { label: "下側", indices: bottomHalfIndices() },
          { label: "左側", indices: leftHalfIndices() },
          { label: "右側", indices: rightHalfIndices() },
          { label: "外側の辺", indices: edgeBandIndices() }
        ].map((group) => ({ ...group, count: countInside(solutionIndices, group.indices) }));

        const rowCounts = Array.from({ length: state.size }, (_, row) => ({
          label: `${lineLabel("row", row)}の横ライン`,
          indices: rowIndices(row),
          count: countInside(solutionIndices, rowIndices(row))
        }));
        const colCounts = Array.from({ length: state.size }, (_, col) => ({
          label: `${lineLabel("col", col)}の縦ライン`,
          indices: colIndices(col),
          count: countInside(solutionIndices, colIndices(col))
        }));

        return [...groups, ...rowCounts, ...colCounts]
          .sort((a, b) => b.count - a.count || a.indices.length - b.indices.length)[0];
      }

      function buildNormalHint(solutionData) {
        const highlights = emptyHintHighlights();
        const { indices } = solutionData;
        if (!indices.length) {
          return { text: "今の形はもう押す場所がないみたい。お題と同じか確認してみて。", highlights };
        }

        const first = indices[0];
        highlights.area = new Set(getAffectedIndices(first));
        highlights.confirm = new Set([first]);
        return {
          text: `ヒント：まず${coordinateLabel(first)}を押してみよう。黄色い範囲が一緒に動くよ。`,
          highlights
        };
      }

      function buildExtraHint(solutionData) {
        const highlights = emptyHintHighlights();
        const { indices } = solutionData;
        if (!indices.length) {
          return { text: "今の形はもう押す場所がないみたい。完成していないか見てみよう。", highlights };
        }

        const count = Math.min(3, Math.max(1, Math.floor(indices.length / 3)));
        const partial = indices.slice(0, count);
        highlights.confirm = new Set(partial);
        return {
          text: `EXTRAヒント：ここは押す場所で確定。${coordinateList(partial)}。まだ全部ではないよ。`,
          highlights
        };
      }

      function showHint() {
        if (state.completed || state.failed || remainingMoves() <= 0 || !hintUnlocked()) return;
        const solutionData = currentSolutionData();
        const hint = state.world === 5
          ? buildExtraHint(solutionData)
          : buildNormalHint(solutionData);

        state.hintHighlights = hint.highlights;
        state.hintIndices = hint.highlights.noTouch;
        state.hintMessage = hint.text;
        state.hintActive = true;
        renderPlay();
      }

      function finishStage() {
        state.completed = true;
        state.elapsedBeforeResult = elapsedSeconds();
        if (state.stage === maxUnlockedFor(state.world) && maxUnlockedFor(state.world) < totalStagesFor(state.world)) {
          setMaxUnlockedFor(state.world, maxUnlockedFor(state.world) + 1);
          writeProgress();
        }
        playClearSound();
        celebrate();
        window.clearTimeout(state.clearTimer);
        state.clearTimer = window.setTimeout(() => {
          if (state.completed && state.screen === "play") showResult("clear");
        }, 1250);
      }

      function failStage() {
        state.failed = true;
        state.elapsedBeforeResult = elapsedSeconds();
        incrementFailureCount();
        window.clearTimeout(state.failTimer);
        state.failTimer = window.setTimeout(() => {
          if (state.failed && state.screen === "play") showResult("fail");
        }, 1600);
      }

      function isSolved() {
        return state.board.every((value, index) => value === state.target[index]);
      }

      function currentDiff() {
        return state.board.map((value, index) => value ^ state.target[index]);
      }

      function remainingMoves() {
        return Math.max(0, state.minimumMoves - state.moves);
      }

      function isIntroTutorialStage(world = state.world, stage = state.stage) {
        return world === 1 && stage >= 1 && stage <= 5;
      }

      function introTutorialMoves() {
        const config = stageConfig(state.stage, state.world);
        return isIntroTutorialStage() && Array.isArray(config.solution) ? config.solution : [];
      }

      function introMovePage(moveIndex, lead) {
        const moves = introTutorialMoves();
        const move = moves[moveIndex];
        const affectedCount = getAffectedIndices(move, state.size, state.world).length;
        return {
          title: `${coordinateLabel(move)}を押してみよう`,
          text: `${lead} オレンジの枠が押す場所、青く光る${affectedCount}マスがひっくり返る場所だよ。`,
          focus: "board",
          moveIndex
        };
      }

      function tutorialSettledIndices(move) {
        const preview = state.board.slice();
        flipAt(preview, move, state.size, state.world);
        return preview
          .map((value, index) => value === state.target[index] && state.board[index] !== state.target[index] ? index : -1)
          .filter((index) => index >= 0);
      }

      function introTutorialPages() {
        const moves = introTutorialMoves();
        if (!moves.length) return [];

        if (state.stage === 1) {
          return [
            {
              title: "ステージ情報はここ",
              text: "WORLD、STAGE、盤面サイズ、反転ルールをここで見られるよ。このステージは4x4で9マス反転。",
              focus: "title"
            },
            {
              title: "残り手数を見よう",
              text: "この数字は、あと何回押せるか。0になる前にお題と同じ形にしよう。",
              focus: "remaining"
            },
            {
              title: "大きな盤面を操作するよ",
              text: "ここが今の盤面。パネルを押すと、緑とたまご模様が入れ替わるよ。",
              focus: "board"
            },
            {
              title: "「お題」がゴールだよ",
              text: "この小さい盤面と同じ形にできたらクリア。スマホではお題を長押しすると、盤面に重ねて見比べられるよ。",
              focus: "target",
            },
            {
              title: "ルール：押すと9マスが変わる",
              text: "WORLD1では、押したマスとそのまわり8マス、合わせて9マスがひっくり返るよ。",
              focus: "board"
            },
            {
              title: "お題の横の数字も見よう",
              text: "「10 / 16」みたいな数字は、お題と同じになっているパネル数だよ。",
              focus: "target"
            },
            {
              title: "時間・手数・最短の見方",
              text: "「手数」は今押した回数。「最短」はクリアに必要な一番少ない回数だよ。",
              focus: "info"
            },
            {
              title: "ボタンの見方",
              text: "「戻す」は1手戻す。「ヒント」は10回チャレンジ後。「リトライ」は最初からやり直しだよ。",
              focus: "tools"
            },
            {
              title: "恐竜くんが時々しゃべるよ",
              text: "ここにはちょっとしたコツが出るよ。10回チャレンジ後は、もっと具体的な考え方も話してくれる。",
              focus: "guide"
            },
            introMovePage(0, "まずは1手だけ。押したマスのまわりも一緒に変わるよ。")
          ];
        }

        if (state.stage === 2) {
          return [
            introMovePage(0, "1つ目の押す場所を見てみよう。"),
            introMovePage(1, "2つ目。青い範囲どうしが重なる場所は、2回ひっくり返って元に戻るよ。")
          ];
        }

        if (state.stage === 3) {
          return [
            introMovePage(0, "角を押すと、動く範囲は4マスだけ。端や角は考える手がかりになるよ。"),
            introMovePage(1, "反対側の角も見てみよう。角は広がりすぎないから、動きが分かりやすいね。")
          ];
        }

        if (state.stage === 4) {
          return [
            introMovePage(0, "内側を押すと、9マスが大きく動くよ。"),
            introMovePage(1, "2つの内側を押すと、重なったところだけ動きが消えるよ。")
          ];
        }

        if (state.stage === 5) {
          return [
            {
              title: "端からそろえる練習",
              text: "端のパネルは、あとから触れる押し場所が少ないよ。だから先に端を決めると、考える場所がぐっと減る。",
              focus: "board"
            },
            {
              title: "まず右端をそろえる",
              text: "右端をまとめてお題に近づけたいから、右寄りの内側を選ぶよ。緑に光る場所が、この手でお題と同じになるパネル。",
              focus: "board",
              moveIndex: 0
            },
            {
              title: "そろえた右端を守る",
              text: "次は少し左を選ぶよ。ここなら右端に触らないので、さっきそろえた端を崩さず中央だけを直せる。",
              focus: "board",
              moveIndex: 1
            },
            {
              title: "最後に残った左側を閉じる",
              text: "残ったズレは左側だけ。左寄りを選ぶと、右端を守ったまま残りがそろって完成するよ。",
              focus: "board",
              moveIndex: 2
            }
          ];
        }

        return [
          {
            title: "押す順番は自由だよ",
            text: "このゲームは、同じ場所を押すか押さないかが大事。順番はあとで決めても大丈夫。",
            focus: "board"
          },
          introMovePage(0, "ここから3手。まず1つ目の押す場所を見よう。"),
          introMovePage(1, "2つ目。青い範囲の重なり方を見ながら押してみよう。"),
          introMovePage(2, "最後の3つ目。押す場所のセットでお題の形を作るよ。")
        ];
      }

      function currentIntroTutorialPage() {
        const pages = introTutorialPages();
        if (!pages.length || state.completed || state.failed) return null;
        const step = Math.min(state.tutorialStep, pages.length - 1);
        return pages[step];
      }

      function currentIntroTutorialMove() {
        const page = currentIntroTutorialPage();
        if (!page || typeof page.moveIndex !== "number") return null;
        const moves = introTutorialMoves();
        return moves[page.moveIndex] ?? null;
      }

      function tutorialFocusElement(focus) {
        const focusMap = {
          title: playTitle,
          board: boardFrameEl,
          remaining: remainingBanner,
          target: targetSection,
          info: infoGrid,
          tools: toolRow,
          guide: dinoGuide
        };
        return focusMap[focus] || null;
      }

      function clearTutorialFocus() {
        [playTitle, boardFrameEl, remainingBanner, targetSection, infoGrid, toolRow, dinoGuide].forEach((element) => {
          element.classList.remove("tutorial-ui-focus");
        });
      }

      function applyTutorialFocus(focus) {
        const element = tutorialFocusElement(focus);
        if (element) element.classList.add("tutorial-ui-focus");
        return element;
      }

      function clampPanelPosition(value, min, max) {
        if (max < min) return min;
        return Math.min(Math.max(value, min), max);
      }

      function positionTutorialPanel(focusElement) {
        if (!focusElement || tutorialPanel.classList.contains("hidden")) return;
        const targetRect = focusElement.getBoundingClientRect();
        const panelRect = tutorialPanel.getBoundingClientRect();
        const viewport = window.visualViewport;
        const bounds = {
          left: viewport ? viewport.offsetLeft : 0,
          top: viewport ? viewport.offsetTop : 0,
          width: viewport ? viewport.width : window.innerWidth,
          height: viewport ? viewport.height : window.innerHeight
        };
        const margin = bounds.width <= 390 ? 8 : 12;
        const maxLeft = bounds.left + bounds.width - panelRect.width - margin;
        const maxTop = bounds.top + bounds.height - panelRect.height - margin;
        const rightLeft = targetRect.right + margin;
        const leftLeft = targetRect.left - panelRect.width - margin;
        let left = rightLeft;
        let top = targetRect.top + (targetRect.height - panelRect.height) / 2;

        if (rightLeft + panelRect.width > bounds.left + bounds.width - margin) {
          left = leftLeft;
        }

        if (left < bounds.left + margin) {
          left = targetRect.left + targetRect.width / 2 - panelRect.width / 2;
          const belowTop = targetRect.bottom + margin;
          const aboveTop = targetRect.top - panelRect.height - margin;
          top = belowTop + panelRect.height <= bounds.top + bounds.height - margin
            ? belowTop
            : aboveTop;
        }

        tutorialPanel.style.setProperty("--tutorial-left", `${clampPanelPosition(left, bounds.left + margin, maxLeft)}px`);
        tutorialPanel.style.setProperty("--tutorial-top", `${clampPanelPosition(top, bounds.top + margin, maxTop)}px`);
      }

      function nextTutorialStepAfterMove(moveIndex) {
        const pages = introTutorialPages();
        let nextStep = state.tutorialStep + 1;
        while (nextStep < pages.length && pages[nextStep].moveIndex === moveIndex) {
          nextStep += 1;
        }
        return Math.min(nextStep, Math.max(0, pages.length - 1));
      }

      function tutorialStepForMoveCount(moveCount) {
        const pages = introTutorialPages();
        const nextStep = pages.findIndex((page) => typeof page.moveIndex === "number" && page.moveIndex >= moveCount);
        return nextStep >= 0 ? nextStep : Math.max(0, pages.length - 1);
      }

      function renderPlay() {
        renderTutorialPanel();
        renderBoards();
        renderInfo();
      }

      function renderTutorialPanel() {
        const pages = introTutorialPages();
        const active = pages.length > 0 && !state.completed && !state.failed;
        playArea.classList.toggle("intro-tutorial", active);
        playScreen.classList.toggle("tutorial-active", active);
        tutorialPanel.classList.toggle("hidden", !active);
        tutorialShade.classList.toggle("hidden", !active);
        clearTutorialFocus();
        if (!active) {
          playScreen.classList.remove("tutorial-reading");
          return;
        }

        state.tutorialStep = Math.min(Math.max(0, state.tutorialStep), pages.length - 1);
        const page = pages[state.tutorialStep];
        const focus = page.focus || (typeof page.moveIndex === "number" ? "board" : "board");
        const focusElement = applyTutorialFocus(focus);
        playScreen.classList.toggle("tutorial-reading", typeof page.moveIndex !== "number");
        tutorialTitle.textContent = page.title;
        tutorialText.textContent = page.text;
        tutorialStepValue.textContent = `${state.tutorialStep + 1} / ${pages.length}`;
        tutorialPrevButton.disabled = state.tutorialStep === 0;
        tutorialNextButton.disabled = state.tutorialStep >= pages.length - 1 || typeof page.moveIndex === "number";
        window.requestAnimationFrame(() => positionTutorialPanel(focusElement));
      }

      function currentGuideMessage() {
        if (state.completed) return "きれいにそろいました";
        if (state.failed) return "点滅している場所を見てみて。そこがお題と違うパネルだよ";
        if (state.hintActive) {
          return state.hintMessage || "ヒントを表示したよ。光っている場所を見てみよう。";
        }
        if (state.moves > 0 && remainingMoves() === 1) {
          return "残り1手だよ。押す前に、お題と今の盤面を見比べよう。";
        }

        const messages = guideMessages();
        const tick = Math.floor(elapsedSeconds() / GUIDE_INTERVAL_SECONDS);
        if (hintUnlocked() && tick > 0 && tick % 3 === 1) {
          return detailedGuideHint();
        }
        if (tick > 0 && tick % 4 === 3) {
          return DINO_CHATS[Math.floor(tick / 4) % DINO_CHATS.length];
        }
        return messages[tick % messages.length];
      }

      function detailedGuideHint() {
        const world = worldConfig();
        if (state.world === 5) {
          return "恐竜くんヒント：EXTRAはすぐ答えを見せないよ。まず辺や角から、押す候補をしぼってみよう。";
        }
        if (world.rule === "cross") {
          return "恐竜くんヒント：上下左右だけが動くよ。まず縦か横のつながりを1つ選んで、そこから直してみよう。";
        }
        if (world.rule === "diagonal") {
          return "恐竜くんヒント：斜めの4方向が動くよ。同じ色のマスがななめに並んでいないか見てみよう。";
        }
        if (state.size >= 8) {
          return "恐竜くんヒント：広い盤面は、左上・右上・左下・右下に分けると急に見やすくなるよ。";
        }
        return "恐竜くんヒント：まず角を見てみよう。角を変えられるボタンは近くの4つだけだから、かなり絞れるよ。";
      }

      function guideMessages() {
        const world = worldConfig();
        const config = stageConfig(state.stage, state.world);
        const messages = [
          config.note,
          `このWORLDは、${world.ruleText}するよ`
        ];

        if (remainingMoves() <= 2) messages.push("残り少なめ。押す前にお題と見比べよう");
        if (state.history.length) messages.push("戻すで1手前から考え直せるよ");
        if (!hintUnlocked()) {
          messages.push(`あと${HINT_UNLOCK_FAILURES - failureCountFor()}回チャレンジで、恐竜くんヒントが出るよ`);
        } else {
          messages.push(detailedGuideHint());
          messages.push(state.world === 5
            ? "ヒントボタンを押すと、確定している押し場所だけ少し見せるよ"
            : "ヒントボタンを押すと、最初に押す場所だけ見せるよ");
        }
        if (world.rule === "cross") messages.push("上下左右は、縦横のつながりを見よう");
        if (world.rule === "diagonal") messages.push("斜めWORLDは、同じ色のマス同士を意識しよう");
        if (state.world === 4) messages.push("WORLD4は広いぶん、手数は控えめだよ");
        if (state.world === 5) messages.push("EXTRAは、押す場所の形を見つけると楽しいよ");
        if (state.size >= 8) messages.push("大きい盤面は、まず四分割して眺めよう");
        if (state.size >= 5) messages.push("広い盤面は端から見ると楽だよ");
        messages.push(...GUIDE_TIPS);

        return [...new Set(messages)];
      }

      function setGuideMessage(message) {
        if (stageNote.textContent === message) return;
        stageNote.textContent = message;
        stageNote.classList.remove("speaking");
        guideDino.classList.remove("speaking");
        void stageNote.offsetWidth;
        stageNote.classList.add("speaking");
        guideDino.classList.add("speaking");
        window.clearTimeout(state.guidePulseTimer);
        state.guidePulseTimer = window.setTimeout(() => {
          stageNote.classList.remove("speaking");
          guideDino.classList.remove("speaking");
        }, 560);
      }

      function renderBoards() {
        boardEl.style.setProperty("--size", state.size);
        targetBoardEl.style.setProperty("--size", state.size);
        targetHoldOverlayEl.style.setProperty("--size", state.size);
        targetZoomBoardEl.style.setProperty("--size", state.size);
        boardEl.textContent = "";
        targetBoardEl.textContent = "";
        targetHoldOverlayEl.textContent = "";
        targetZoomBoardEl.textContent = "";

        const affected = !supportsHoverPreview || state.hoveredIndex === null
          ? new Set()
          : new Set(getAffectedIndices(state.hoveredIndex));
        const tutorialPage = currentIntroTutorialPage();
        const tutorialReadOnly = tutorialPage && typeof tutorialPage.moveIndex !== "number";
        const tutorialMove = currentIntroTutorialMove();
        const tutorialAffected = tutorialMove === null
          ? new Set()
          : new Set(getAffectedIndices(tutorialMove, state.size, state.world));
        const tutorialSettled = tutorialMove === null
          ? new Set()
          : new Set(tutorialSettledIndices(tutorialMove));

        state.board.forEach((value, index) => {
          const tile = document.createElement("button");
          tile.type = "button";
          tile.className = [
            "tile",
            `state-${value}`,
            affected.has(index) ? "affected" : "",
            tutorialAffected.has(index) ? "tutorial-affected" : "",
            tutorialSettled.has(index) ? "tutorial-settled" : "",
            tutorialMove === index ? "tutorial-press" : "",
            state.lastFlipped.has(index) ? "flipped" : "",
            state.hintHighlights.area.has(index) ? "hint-area" : "",
            state.hintHighlights.candidate.has(index) ? "hint-candidate" : "",
            state.hintHighlights.confirm.has(index) ? "hint-confirm" : "",
            state.hintHighlights.answer.has(index) ? "hint-answer" : "",
            state.hintIndices.has(index) ? "no-touch-hint" : "",
            state.failed && value !== state.target[index] ? "mismatch" : ""
          ].filter(Boolean).join(" ");
          tile.setAttribute("aria-label", coordinateLabel(index));
          tile.disabled = state.completed || state.failed || tutorialReadOnly;
          tile.addEventListener("click", () => performMove(index));
          if (supportsHoverPreview) {
            tile.addEventListener("mouseenter", () => {
              if (state.hoveredIndex === index) return;
              state.hoveredIndex = index;
              renderBoards();
            });
            tile.addEventListener("mouseleave", () => {
              if (state.hoveredIndex === null) return;
              state.hoveredIndex = null;
              renderBoards();
            });
            tile.addEventListener("focus", () => {
              if (state.hoveredIndex === index) return;
              state.hoveredIndex = index;
              renderBoards();
            });
            tile.addEventListener("blur", () => {
              if (state.hoveredIndex === null) return;
              state.hoveredIndex = null;
              renderBoards();
            });
          }
          boardEl.append(tile);
        });

        state.target.forEach((value, index) => {
          renderTargetTile(targetBoardEl, value, index, { mini: true });
          renderTargetTile(targetHoldOverlayEl, value, index, { hold: true });
          renderTargetTile(targetZoomBoardEl, value, index, { mini: true });
        });

        if (!targetHoldOverlayEl.classList.contains("hidden")) syncTargetHoldOverlayBounds();
      }

      function renderTargetTile(container, value, index, options = {}) {
        const isDiff = value !== state.board[index];
        const tile = document.createElement("div");
        tile.className = [
          "tile",
          options.mini ? "tile-mini" : "",
          options.hold ? "tile-hold" : "",
          `state-${value}`,
          options.hold && isDiff ? "target-diff" : "",
          options.hold && !isDiff ? "target-match" : "",
          state.failed && isDiff ? "mismatch" : ""
        ].filter(Boolean).join(" ");
        container.append(tile);
      }

      function hintButtonLabel(failures, hintReady) {
        if (!hintReady) return `ヒント${Math.min(failures, HINT_UNLOCK_FAILURES)}/10`;
        return state.hintActive ? "ヒント表示中" : "ヒント";
      }

      function renderInfo() {
        const hintReady = hintUnlocked();
        const failures = failureCountFor();
        const world = worldConfig();
        worldValue.textContent = worldTitleLabel();
        stageValue.textContent = state.stage;
        sizeValue.textContent = `${state.size}x${state.size}`;
        ruleValue.textContent = world.ruleLabel;
        remainingValue.textContent = remainingMoves();
        movesValue.textContent = state.moves;
        shortestValue.textContent = state.minimumMoves;
        timeValue.textContent = formatTime(state.completed || state.failed ? state.elapsedBeforeResult : elapsedSeconds());
        targetCount.textContent = `${countMatches()} / ${state.target.length}`;
        remainingBanner.classList.toggle("warning", !state.completed && !state.failed && remainingMoves() <= 2);
        undoButton.disabled = !state.history.length || state.completed || state.failed;
        hintButton.disabled = state.completed || state.failed || remainingMoves() <= 0 || !hintReady;
        hintButton.textContent = hintButtonLabel(failures, hintReady);
        hintButton.title = hintReady
          ? state.world === 5
            ? "EXTRA用ヒントを表示"
            : "ヒントを表示"
          : `${HINT_UNLOCK_FAILURES}回チャレンジするとヒントが使えます`;
        setGuideMessage(currentGuideMessage());
      }

      function countMatches() {
        return state.board.reduce((sum, value, index) => sum + (value === state.target[index] ? 1 : 0), 0);
      }

      function showTargetOverlay() {
        targetOverlay.classList.remove("hidden");
      }

      function hideTargetOverlay() {
        targetOverlay.classList.add("hidden");
      }

      function syncTargetHoldOverlayBounds() {
        const boardRect = boardEl.getBoundingClientRect();
        const frameRect = boardFrameEl.getBoundingClientRect();
        targetHoldOverlayEl.style.left = `${boardRect.left - frameRect.left}px`;
        targetHoldOverlayEl.style.top = `${boardRect.top - frameRect.top}px`;
        targetHoldOverlayEl.style.width = `${boardRect.width}px`;
        targetHoldOverlayEl.style.height = `${boardRect.height}px`;
      }

      function showTargetHoldOverlay(event) {
        if (state.screen !== "play" || state.completed || state.failed) return;
        if (event) {
          if (event.pointerType === "mouse" && event.button !== 0) return;
          event.preventDefault();
          if (targetBoardEl.setPointerCapture && event.pointerId !== undefined) {
            targetBoardEl.setPointerCapture(event.pointerId);
          }
        }
        syncTargetHoldOverlayBounds();
        targetHoldOverlayEl.classList.remove("hidden");
      }

      function hideTargetHoldOverlay() {
        targetHoldOverlayEl.classList.add("hidden");
      }

      function showResult(type) {
        window.clearTimeout(state.failTimer);
        state.failTimer = 0;
        resultOverlay.classList.remove("hidden");
        if (type === "clear") {
          const totalStages = totalStagesFor(state.world);
          const hasNext = state.stage < totalStages;
          resultTitle.textContent = state.stage === totalStages ? state.world === 5 ? "EXTRA CLEAR" : "WORLD CLEAR" : state.stage % 5 === 0 && hasNext ? "BOARD UP" : "STAGE CLEAR";
          resultText.textContent = hasNext
            ? `${worldConfig().label} S${state.stage}を最短${state.minimumMoves}手でクリア。次はS${state.stage + 1}です。`
            : `${worldConfig().label}の全ステージクリアです。`;
          resultPrimaryButton.textContent = hasNext ? "次へ" : "選択へ";
          resultPrimaryButton.onclick = () => {
            if (hasNext) startStage(state.stage + 1, state.world);
            else showScreen("stage");
          };
        } else {
          resultTitle.textContent = "LIMIT OVER";
          resultText.textContent = hintUnlocked()
            ? "ヒントが使えるようになりました。点滅していた場所を、お題と見比べてみて。"
            : `点滅していた場所を、お題と見比べてみて。ヒントまであと${HINT_UNLOCK_FAILURES - failureCountFor()}回チャレンジ。`;
          resultPrimaryButton.textContent = "リトライ";
          resultPrimaryButton.onclick = retryStage;
        }
        resultSecondaryButton.onclick = () => showScreen("stage");
      }

      function hideResult() {
        window.clearTimeout(state.failTimer);
        state.failTimer = 0;
        window.clearTimeout(state.clearTimer);
        state.clearTimer = 0;
        window.clearTimeout(state.guidePulseTimer);
        stageNote.classList.remove("speaking");
        guideDino.classList.remove("speaking");
        resultOverlay.classList.add("hidden");
        playArea.classList.remove("clear-glow");
        burstLayer.textContent = "";
      }

      function celebrate() {
        playArea.classList.add("clear-glow");
        burstLayer.textContent = "";
        for (let i = 0; i < 34; i += 1) {
          const piece = document.createElement("span");
          const x = 28 + Math.random() * 44;
          const y = 34 + Math.random() * 18;
          piece.className = "confetti";
          piece.style.left = `${x}%`;
          piece.style.top = `${y}%`;
          piece.style.background = CONFETTI_COLORS[i % CONFETTI_COLORS.length];
          piece.style.setProperty("--dx", `${(Math.random() - 0.5) * 360}px`);
          piece.style.setProperty("--dy", `${160 + Math.random() * 230}px`);
          piece.style.setProperty("--rot", `${180 + Math.random() * 540}deg`);
          piece.style.animationDelay = `${Math.random() * 90}ms`;
          burstLayer.append(piece);
        }
        window.setTimeout(() => {
          playArea.classList.remove("clear-glow");
        }, 720);
      }

      function unlockAudio() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return null;
        if (!state.audioContext) state.audioContext = new AudioContext();
        if (state.audioContext.state === "suspended") state.audioContext.resume();
        return state.audioContext;
      }

      function playFlipSound() {
        const ctx = unlockAudio();
        if (!ctx) return;
        const now = ctx.currentTime;
        const duration = 0.28;
        const buffer = ctx.createBuffer(1, Math.floor(ctx.sampleRate * duration), ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i += 1) {
          const progress = i / data.length;
          const snap = Math.exp(-progress * 8.2);
          const flutter = 0.62 + Math.sin(i * 0.087) * 0.18 + Math.sin(i * 0.029) * 0.13;
          const noise = Math.random() * 2 - 1;
          data[i] = noise * flutter * snap;
        }

        const paper = ctx.createBufferSource();
        const high = ctx.createBiquadFilter();
        const crisp = ctx.createBiquadFilter();
        const gain = ctx.createGain();

        paper.buffer = buffer;
        high.type = "highpass";
        high.frequency.setValueAtTime(520, now);
        high.frequency.linearRampToValueAtTime(980, now + duration * 0.72);
        crisp.type = "bandpass";
        crisp.frequency.setValueAtTime(2200, now);
        crisp.frequency.exponentialRampToValueAtTime(860, now + duration);
        crisp.Q.setValueAtTime(0.85, now);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.23, now + 0.012);
        gain.gain.setTargetAtTime(0.085, now + 0.045, 0.055);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

        paper.connect(high).connect(crisp).connect(gain).connect(ctx.destination);
        paper.start(now);
        paper.stop(now + duration);

        [
          { offset: 0, frequency: 410, peak: 0.07, length: 0.055 },
          { offset: 0.12, frequency: 250, peak: 0.06, length: 0.075 }
        ].forEach((snap) => {
          const click = ctx.createOscillator();
          const clickGain = ctx.createGain();
          click.type = "triangle";
          click.frequency.setValueAtTime(snap.frequency, now + snap.offset);
          click.frequency.exponentialRampToValueAtTime(120, now + snap.offset + snap.length);
          clickGain.gain.setValueAtTime(0.0001, now + snap.offset);
          clickGain.gain.exponentialRampToValueAtTime(snap.peak, now + snap.offset + 0.008);
          clickGain.gain.exponentialRampToValueAtTime(0.0001, now + snap.offset + snap.length);
          click.connect(clickGain).connect(ctx.destination);
          click.start(now + snap.offset);
          click.stop(now + snap.offset + snap.length);
        });
      }

      function playClearSound() {
        const ctx = unlockAudio();
        if (!ctx) return;
        const now = ctx.currentTime;
        [523.25, 659.25, 783.99, 1046.5].forEach((frequency, index) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = index === 3 ? "triangle" : "sine";
          osc.frequency.setValueAtTime(frequency, now + index * 0.08);
          gain.gain.setValueAtTime(0.0001, now + index * 0.08);
          gain.gain.exponentialRampToValueAtTime(0.13, now + index * 0.08 + 0.025);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + index * 0.08 + 0.42);
          osc.connect(gain).connect(ctx.destination);
          osc.start(now + index * 0.08);
          osc.stop(now + index * 0.08 + 0.45);
        });
      }

      function elapsedSeconds() {
        return Math.max(0, Math.floor((Date.now() - state.startedAt) / 1000));
      }

      function formatTime(totalSeconds) {
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${minutes}:${String(seconds).padStart(2, "0")}`;
      }

      startButton.addEventListener("click", () => showScreen("stage"));
      selectButton.addEventListener("click", () => showScreen("stage"));
      homeFromStagesButton.addEventListener("click", () => showScreen("menu"));
      quickCurrentButton.addEventListener("click", () => startStage(maxUnlockedFor(state.selectedWorld), state.selectedWorld));
      backToStagesButton.addEventListener("click", () => showScreen("stage"));
      stageButton.addEventListener("click", () => showScreen("stage"));
      retryButton.addEventListener("click", () => retryStage({ countHint: true }));
      undoButton.addEventListener("click", undoMove);
      hintButton.addEventListener("click", showHint);
      tutorialPrevButton.addEventListener("click", () => {
        state.tutorialStep = Math.max(0, state.tutorialStep - 1);
        renderPlay();
      });
      tutorialNextButton.addEventListener("click", () => {
        const pages = introTutorialPages();
        state.tutorialStep = Math.min(Math.max(0, pages.length - 1), state.tutorialStep + 1);
        renderPlay();
      });
      targetZoomButton.addEventListener("click", showTargetOverlay);
      targetCloseButton.addEventListener("click", hideTargetOverlay);
      targetOverlay.addEventListener("click", (event) => {
        if (event.target === targetOverlay) hideTargetOverlay();
      });
      targetBoardEl.addEventListener("pointerdown", showTargetHoldOverlay);
      targetBoardEl.addEventListener("pointerup", hideTargetHoldOverlay);
      targetBoardEl.addEventListener("pointercancel", hideTargetHoldOverlay);
      targetBoardEl.addEventListener("lostpointercapture", hideTargetHoldOverlay);
      targetBoardEl.addEventListener("pointerleave", (event) => {
        if (event.pointerType === "mouse") hideTargetHoldOverlay();
      });
      targetBoardEl.addEventListener("contextmenu", (event) => event.preventDefault());
      resetProgressButton.addEventListener("click", () => {
        state.progress = defaultProgress(1);
        state.world = 1;
        state.selectedWorld = 1;
        writeProgress();
        renderMenu();
      });

      window.addEventListener("keydown", (event) => {
        if (state.screen !== "play") return;
        if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "z") {
          event.preventDefault();
          undoMove();
        }
        if (event.key === "Escape") {
          if (!targetOverlay.classList.contains("hidden")) hideTargetOverlay();
          else showScreen("stage");
        }
      });

      window.addEventListener("resize", () => {
        if (!targetHoldOverlayEl.classList.contains("hidden")) syncTargetHoldOverlayBounds();
        const page = currentIntroTutorialPage();
        if (page) positionTutorialPanel(tutorialFocusElement(page.focus || "board"));
      });

      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", () => {
          const page = currentIntroTutorialPage();
          if (page) positionTutorialPanel(tutorialFocusElement(page.focus || "board"));
        });
        window.visualViewport.addEventListener("scroll", () => {
          const page = currentIntroTutorialPage();
          if (page) positionTutorialPanel(tutorialFocusElement(page.focus || "board"));
        });
      }

      window.setInterval(() => {
        if (state.screen === "play" && !state.completed && !state.failed) renderInfo();
      }, 1000);

      renderMenu();
    })();
  </script>
</body>
